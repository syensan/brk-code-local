name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Run tests
        run: pytest -v

      - name: Test CLI
        run: |
          python -m brk_code --help
          python -m brk_code scan examples/sample_project test_output.brk --include-snippets
          python -m brk_code inspect test_output.brk
          python -m brk_code verify test_output.brk
